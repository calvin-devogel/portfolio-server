name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    SQLX_OFFLINE: "true"

permissions:
    contents: read
    packages: write

jobs:
    fmt:
        name: Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                components: rustfmt
            - run: cargo fmt --check
    
    clippy:
        name: Clippy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                components: clippy
            - uses: Swatinem/rust-cache@v2
            - run: cargo clippy -- -D warnings
    
    test:
        name: Integration Tests
        runs-on: ubuntu-latest
        services:
            valkey:
                image: valkey/valkey:8-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "valkey-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2

            # Rust's run-in-parallel tests are exhausting the default connection limit
            # for the "services" version of postgres containers, so we need bo build it
            # ourselves
            - name: Start PostgreSQL
              run: |
                docker run -d \
                    --name postgres \
                    -e POSTGRES_USER=postgres \
                    -e POSTGRES_PASSWORD=password \
                    -p 5432:5432 \
                    postgres:17-alpine -N 1000
                until docker exec postgres pg_isready -U postgres; do
                    echo "Waiting for PostgreSQL..."
                    sleep 1
                done

            
            - name: Install sqlx-cli
              run: cargo install sqlx-cli --no-default-features --features rustls,postgres --locked

            - name: Create app database user
              run: |
                psql -h localhost -U postgres \
                    -c "CREATE USER app WITH PASSWORD 'secret'" \
                    -c "ALTER USER app CREATEDB;"
              env:
                PGPASSWORD: password
            
            - name: Run migrations
              run: SKIP_DOCKER=true ./scripts/init_db.sh
              env:
                SUPERUSER: postgres
                SUPERUSER_PWD: password
                APP_USER: app
                APP_USER_PWD: secret
                APP_DB_NAME: portfolio
            
            - name: Run test
              run: cargo test
              env:
                APP_ENVIRONMENT: local
                APP_APPLICATION__JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
    
    docker-build:
        name: Docker Build
        needs: [fmt, clippy, test]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3

            - name: Authenticate with DigitalOcean
              uses: digitalocean/action-doctl@v2
              with:
                token: ${{ secrets.DO_API_TOKEN }}
            
            - name: Log in to DOCR
              uses: docker/login-action@v3
              with:
                registry: registry.digitalocean.com
                username: ${{ secrets.DO_API_TOKEN }}
                password: ${{ secrets.DO_API_TOKEN }}
            
            - uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/portfolio-server:latest
                cache-from: type=gha
                cache-to: type=gha,mode=max

    deploy:
        name: Deploy
        needs: docker-build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        environment: production
        steps:
            - name: Authenticate with DigitalOcean
              uses: digitalocean/action-doctl@v2
              with:
                token: ${{ secrets.DO_API_TOKEN }}
            
            - name: Trigger deployment
              run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait